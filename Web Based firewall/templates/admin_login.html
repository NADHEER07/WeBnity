<!DOCTYPE html>
<html>

<head>

<title>Webrix Admin Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">

<style>

body{
background:#050a14;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Orbitron;
color:white;
}

.login-box{

background:#0b1624;
padding:40px;
border-radius:15px;
width:350px;
box-shadow:0 0 25px rgba(0,255,200,0.2);
text-align:center;

}

.login-box h2{
color:#00eaff;
margin-bottom:25px;
}

.login-box input{

width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:8px;
background:#111;
color:white;

}

.login-box button{

margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#00eaff;
color:black;
font-weight:bold;
cursor:pointer;

}

.login-box button:hover{

background:#00c9d6;

}

.error{
color:red;
margin-top:15px;
}

</style>

</head>

<body>

<div class="login-box">

<h2>🛡 Webrix Admin Login</h2>

<form method="POST">

<input type="email" name="email" placeholder="Admin Email" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Secure Login</button>

</form>

{% if error %}

<div class="error">{{ error }}</div>

{% endif %}

</div>

</body>

</html>
